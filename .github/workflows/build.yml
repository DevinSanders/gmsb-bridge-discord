name: Build

# Validates the plugin builds + packages on every push and PR. The
# produced zip is uploaded as a workflow artifact so reviewers can
# install it on a local copy of Game Master Sound Board to smoke-test
# without having to build the plugin themselves.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build + package
    # This plugin DOES ship native bins (libdave / libopus / libsodium),
    # but the NuGet packages carry every RID's binaries, so a single
    # ubuntu run produces one zip that installs on Windows / macOS / Linux.
    # No build matrix needed.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/*.csproj

      - name: Test
        # Network-free unit tests over the bridge's pure pieces (config
        # round-trip, status lifecycle, ConnectAsync validation + codec-
        # borrow errors, outbound framing). The live Discord connection is
        # a manual checklist (see README), not covered here.
        run: dotnet test tests/DiscordBridgePlugin.Tests.csproj -c Release --nologo

      - name: Package
        shell: pwsh
        run: ./scripts/package.ps1
